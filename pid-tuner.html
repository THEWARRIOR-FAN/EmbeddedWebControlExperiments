<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PID 调节实验</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #f5f7fb; max-width: 1120px; margin: 0 auto; padding: 20px; color: #1f2937; }
    h1 { text-align: center; margin: 0 0 8px; }
    .subtitle { text-align: center; color: #6b7280; margin-bottom: 16px; }
    .container { display: flex; gap: 18px; align-items: flex-start; }
    .panel { background: #fff; padding: 18px; border-radius: 10px; box-shadow: 0 2px 10px rgba(15,23,42,.08); }
    .left { width: 330px; }
    .right { flex: 1; }
    h3 { margin: 0 0 12px; }
    .param { margin: 14px 0; }
    label { display: block; font-weight: 700; margin-bottom: 6px; color: #374151; }
    input[type="range"] { width: 100%; }
    .param-control { display: flex; align-items: center; gap: 8px; }
    .value { color: #2563eb; font-weight: 700; min-width: 56px; display: inline-block; text-align: right; }
    .btn { padding: 8px 12px; background: #2563eb; color: #fff; border: 0; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    .btn:hover { background: #1d4ed8; }
    .btn-auto { background: #16a34a; }
    .btn-auto:hover { background: #15803d; }
    .btn-secondary { background: #6b7280; }
    .btn-secondary:hover { background: #4b5563; }
    .param-btn { width: 34px; height: 34px; padding: 0; margin-top: 0; flex: 0 0 34px; }
    .preset-btn { width: 100%; }
    .info, .status, .tips { line-height: 1.7; font-size: 14px; }
    .pool-box { position: relative; width: 100%; height: 300px; border: 3px solid #6b7280; border-bottom: none; margin: 14px 0 16px; background: #fff; overflow: hidden; }
    .water { position: absolute; bottom: 0; width: 100%; background: linear-gradient(#60a5fa, #2563eb); }
    .target-line { position: absolute; left: 0; width: 100%; height: 3px; background: #ef4444; z-index: 10; }
    canvas { width: 100%; height: 260px; border: 1px solid #d1d5db; background: #fafafa; display: block; }
    .status, .tips { margin-top: 10px; padding: 10px 12px; border-radius: 8px; background: #f8fafc; border: 1px solid #e5e7eb; }
    .tips { color: #475569; }
    .chart-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 16px; }
    .chart-head h3 { margin: 0; }
    .chart-tools { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .chart-tools .btn { margin-top: 0; }
    .scrubber-wrap { margin-top: 10px; display: grid; gap: 6px; }
    .scrubber-label { display: flex; justify-content: space-between; gap: 12px; color: #64748b; font-size: 13px; }
    .scrubber { width: 100%; accent-color: #2563eb; }
    .scrubber:disabled { opacity: 0.45; cursor: not-allowed; }

    @media (max-width: 920px) {
      .container { flex-direction: column; }
      .left { width: 100%; }
      .scrubber-label { flex-direction: column; gap: 2px; }
    }
  </style>
</head>
<body>
  <h1>PID 调节实验</h1>
  <div class="subtitle">先调 P 到轻微等幅振荡，再加 I 消除静差，最后加 D 抑制超调</div>

  <div class="container">
    <div class="panel left">
      <h3>参数</h3>

      <div class="param">
        <label for="setPoint">目标液位 (m)</label>
        <div class="param-control">
          <button class="btn param-btn" onclick="adjustParam('setPoint', -0.1)">-</button>
          <input type="range" id="setPoint" min="0.2" max="0.8" step="0.1" value="0.6">
          <button class="btn param-btn" onclick="adjustParam('setPoint', 0.1)">+</button>
        </div>
        <span class="value" id="setPointVal">0.6</span>
      </div>

      <div class="param">
        <label for="kp">Kp</label>
        <div class="param-control">
          <button class="btn param-btn" onclick="adjustParam('kp', -0.1)">-</button>
          <input type="range" id="kp" min="0" max="80" step="0.1" value="8.0">
          <button class="btn param-btn" onclick="adjustParam('kp', 0.1)">+</button>
        </div>
        <span class="value" id="kpVal">8.0</span>
      </div>

      <div class="param">
        <label for="ki">Ki</label>
        <div class="param-control">
          <button class="btn param-btn" onclick="adjustParam('ki', -0.1)">-</button>
          <input type="range" id="ki" min="0" max="20" step="0.1" value="0.0">
          <button class="btn param-btn" onclick="adjustParam('ki', 0.1)">+</button>
        </div>
        <span class="value" id="kiVal">0.0</span>
      </div>

      <div class="param">
        <label for="kd">Kd</label>
        <div class="param-control">
          <button class="btn param-btn" onclick="adjustParam('kd', -0.1)">-</button>
          <input type="range" id="kd" min="0" max="20" step="0.1" value="0.0">
          <button class="btn param-btn" onclick="adjustParam('kd', 0.1)">+</button>
        </div>
        <span class="value" id="kdVal">0.0</span>
      </div>

      <button class="btn btn-auto" onclick="autoTune()">一键整定</button>
      <button class="btn btn-secondary" onclick="resetSystem()">重置实验</button>

      <h3 style="margin-top:18px">实验预设</h3>
      <button class="btn preset-btn" onclick="loadPreset('pOnly')">P 控制</button>
      <button class="btn preset-btn" onclick="loadPreset('pi')">PI 控制</button>
      <button class="btn preset-btn" onclick="loadPreset('pid')">PID 控制</button>

      <div class="status" id="tuneStatus">当前为手动调参模式</div>
      <div class="tips">
        建议实验顺序：<br>
        1. 先设 Ki=0、Kd=0，缓慢增大 Kp，直到出现轻微等幅振荡。<br>
        2. 再增加 Ki，观察静差减小到消失。<br>
        3. 最后增加 Kd，压低超调并缩短稳定时间。
      </div>
    </div>

    <div class="panel right">
      <h3>液位响应</h3>
      <div class="pool-box">
        <div class="water" id="water"></div>
        <div class="target-line" id="targetLine"></div>
      </div>
      <div class="info">
        当前液位 <span class="value" id="currentLv">0.00</span> m
        &nbsp;&nbsp;阀门开度 <span class="value" id="valve">0</span> %
        &nbsp;&nbsp;误差 <span class="value" id="error">0.00</span> m
        <br>
        理论静差 <span class="value" id="theoryError">0.00</span> m
        &nbsp;&nbsp;延时 <span class="value" id="delayDisplay">16</span> 帧
      </div>
      <div class="chart-head">
        <h3>曲线</h3>
        <div class="chart-tools">
          <button class="btn btn-secondary" id="toggleRunBtn" type="button">暂停</button>
        </div>
      </div>
      <canvas id="chart"></canvas>
      <div class="scrubber-wrap">
        <div class="scrubber-label">
          <span id="scrubberState">运行中：显示最新曲线</span>
          <span id="scrubberRange">0.0s - 0.0s</span>
        </div>
        <input class="scrubber" id="historyScrubber" type="range" min="0" max="0" value="0" disabled>
      </div>
    </div>
  </div>

  <script>
    let setPoint = 0.6;
    let kp = 8.0;
    let ki = 0.0;
    let kd = 0.0;

    let currentLevel = 0.0;
    let levelSpeed = 0.0;
    let integral = 0.0;
    let valveOpen = 0.0;
    let actuator = 0.0;

    const dt = 1 / 60;
    const delayFrames = 16;
    const maxValve = 100;
    const inflowGain = 0.18;
    const baseLeak = 0.012;
    const levelLeak = 0.006;
    const plantAccel = 4.5;
    const plantDamping = 0.18;
    const speedMemory = 0.985;
    const actuatorLag = 0.12;
    const derivativeFilter = 0.18;
    const levelScale = 18;
    const visiblePoints = 360;
    const maxStoredPoints = 2400;

    let lastMeasurement = 0.0;
    let filteredDerivative = 0.0;

    let delayQueue = new Array(delayFrames).fill(0);
    let history = [];
    let isPaused = false;
    let viewStartIndex = 0;

    const waterEl = document.getElementById("water");
    const targetLineEl = document.getElementById("targetLine");
    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");
    const toggleRunBtn = document.getElementById("toggleRunBtn");
    const historyScrubber = document.getElementById("historyScrubber");
    const scrubberStateEl = document.getElementById("scrubberState");
    const scrubberRangeEl = document.getElementById("scrubberRange");

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawChart();
    }

    function roundToStep(v, step) {
      return Math.round(v / step) * step;
    }

    function syncUI() {
      document.getElementById("setPoint").value = setPoint;
      document.getElementById("setPointVal").textContent = setPoint.toFixed(1);
      document.getElementById("kp").value = kp;
      document.getElementById("kpVal").textContent = kp.toFixed(1);
      document.getElementById("ki").value = ki;
      document.getElementById("kiVal").textContent = ki.toFixed(1);
      document.getElementById("kd").value = kd;
      document.getElementById("kdVal").textContent = kd.toFixed(1);
      updateTargetLine();
      drawChart();
    }

    function adjustParam(name, delta) {
      const input = document.getElementById(name);
      const step = parseFloat(input.step) || 0.1;
      let value = roundToStep(parseFloat(input.value) + delta, step);
      value = Math.max(parseFloat(input.min), Math.min(parseFloat(input.max), value));

      if (name === "setPoint") setPoint = value;
      if (name === "kp") kp = value;
      if (name === "ki") ki = value;
      if (name === "kd") kd = value;

      syncUI();
      resetSystem(false);
    }

    function loadPreset(name) {
      if (name === "pOnly") {
        kp = 26.0;
        ki = 0.0;
        kd = 0.0;
        document.getElementById("tuneStatus").textContent = "P 模式：这组 Kp 已接近持续振荡，便于观察纯比例控制";
      }
      if (name === "pi") {
        kp = 18.0;
        ki = 2.2;
        kd = 0.0;
        document.getElementById("tuneStatus").textContent = "PI 模式：静差会逐步减小，但通常会带来更明显的超调";
      }
      if (name === "pid") {
        kp = 19.0;
        ki = 3.4;
        kd = 4.0;
        document.getElementById("tuneStatus").textContent = "PID 模式：快速逼近目标，同时把超调压得更低";
      }

      syncUI();
      resetSystem(false);
    }

    function autoTune() {
      kp = 19.0;
      ki = 3.4;
      kd = 4.0;
      syncUI();
      resetSystem(false);
      document.getElementById("tuneStatus").textContent = "已切换到一组更快且更稳的 PID 参数";
    }

    function resetSystem(clearStatus = true) {
      currentLevel = 0.0;
      levelSpeed = 0.0;
      integral = 0.0;
      lastMeasurement = 0.0;
      filteredDerivative = 0.0;
      valveOpen = 0.0;
      actuator = 0.0;
      delayQueue = new Array(delayFrames).fill(0);
      history = [];
      isPaused = false;
      viewStartIndex = 0;
      updateReadout();
      updateScrubberUI();
      drawChart();
      if (clearStatus) {
        document.getElementById("tuneStatus").textContent = "当前为手动调参模式";
      }
    }

    function updateTargetLine() {
      targetLineEl.style.bottom = (setPoint * 100) + "%";
    }

    document.getElementById("setPoint").oninput = function () {
      setPoint = parseFloat(this.value);
      syncUI();
      resetSystem();
    };

    document.getElementById("kp").oninput = function () {
      kp = parseFloat(this.value);
      syncUI();
      resetSystem();
    };

    document.getElementById("ki").oninput = function () {
      ki = parseFloat(this.value);
      syncUI();
      resetSystem();
    };

    document.getElementById("kd").oninput = function () {
      kd = parseFloat(this.value);
      syncUI();
      resetSystem();
    };

    toggleRunBtn.addEventListener("click", function () {
      isPaused = !isPaused;
      if (!isPaused) {
        viewStartIndex = getLatestViewStart();
      }
      updateScrubberUI();
      drawChart();
    });

    historyScrubber.addEventListener("input", function () {
      viewStartIndex = parseInt(this.value, 10) || 0;
      updateScrubberUI();
      drawChart();
    });

    function getLatestViewStart() {
      return Math.max(0, history.length - visiblePoints);
    }

    function formatTime(index) {
      return (Math.max(0, index) * dt).toFixed(1) + "s";
    }

    function updateScrubberUI() {
      const maxStart = getLatestViewStart();
      if (!isPaused) {
        viewStartIndex = maxStart;
      } else {
        viewStartIndex = Math.max(0, Math.min(viewStartIndex, maxStart));
      }

      historyScrubber.max = String(maxStart);
      historyScrubber.value = String(viewStartIndex);
      historyScrubber.disabled = !isPaused || maxStart === 0;
      toggleRunBtn.textContent = isPaused ? "启动" : "暂停";
      scrubberStateEl.textContent = isPaused ? "已暂停：可拖动滑块回看" : "运行中：显示最新曲线";

      if (history.length === 0) {
        scrubberRangeEl.textContent = "0.0s - 0.0s";
        return;
      }

      const endIndex = Math.min(history.length, viewStartIndex + visiblePoints);
      scrubberRangeEl.textContent = formatTime(viewStartIndex) + " - " + formatTime(endIndex - 1);
    }

    function updateReadout() {
      const error = setPoint - currentLevel;
      waterEl.style.height = (currentLevel * 100) + "%";
      document.getElementById("currentLv").textContent = currentLevel.toFixed(2);
      document.getElementById("valve").textContent = Math.round(actuator);
      document.getElementById("error").textContent = error.toFixed(2);
      document.getElementById("delayDisplay").textContent = delayFrames;
      document.getElementById("theoryError").textContent = ki > 0 ? "0.000" : (baseLeak / Math.max(kp * inflowGain, 1e-6)).toFixed(3);
    }

    function pidControl() {
      const error = setPoint - currentLevel;
      const measurementDerivative = (currentLevel - lastMeasurement) / dt;
      filteredDerivative += derivativeFilter * (measurementDerivative - filteredDerivative);

      integral += error * dt;
      integral = Math.max(-4.5, Math.min(4.5, integral));

      const command = kp * error + ki * integral - kd * filteredDerivative;
      valveOpen = Math.max(0, Math.min(maxValve, command));
      lastMeasurement = currentLevel;

      delayQueue.push(valveOpen);
      const delayedValve = delayQueue.shift();

      actuator += actuatorLag * (delayedValve - actuator);
      const valveRatio = actuator / maxValve;
      const inflow = inflowGain * valveRatio;
      const outflow = baseLeak + levelLeak * currentLevel;

      const accel = plantAccel * (inflow - outflow) - plantDamping * levelSpeed;
      levelSpeed = speedMemory * levelSpeed + accel * dt;
      currentLevel = Math.max(0, Math.min(1, currentLevel + levelSpeed * dt * levelScale));

      if (currentLevel <= 0 && levelSpeed < 0) levelSpeed = 0;
      if (currentLevel >= 1 && levelSpeed > 0) levelSpeed = 0;

      updateReadout();

      history.push(currentLevel);
      if (history.length > maxStoredPoints) {
        history.shift();
        if (isPaused && viewStartIndex > 0) viewStartIndex -= 1;
      }

      updateScrubberUI();
      drawChart();
    }

    function drawChart() {
      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      const start = isPaused ? viewStartIndex : getLatestViewStart();
      const end = Math.min(history.length, start + visiblePoints);

      ctx.clearRect(0, 0, w, h);

      ctx.strokeStyle = "#e5e7eb";
      ctx.lineWidth = 1;
      for (let i = 1; i < 5; i++) {
        const gy = (h / 5) * i;
        ctx.beginPath();
        ctx.moveTo(0, gy);
        ctx.lineTo(w, gy);
        ctx.stroke();
      }

      ctx.strokeStyle = "#ef4444";
      ctx.lineWidth = 2;
      ctx.beginPath();
      const ty = h - setPoint * h;
      ctx.moveTo(0, ty);
      ctx.lineTo(w, ty);
      ctx.stroke();

      ctx.strokeStyle = "#2563eb";
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = start; i < end; i++) {
        const val = history[i];
        if (val == null) continue;
        const progress = end - start <= 1 ? 0 : (i - start) / (end - start - 1);
        const x = progress * w;
        const y = h - val * h;
        if (i === start) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    function loop() {
      if (!isPaused) pidControl();
      requestAnimationFrame(loop);
    }

    syncUI();
    updateReadout();
    updateScrubberUI();
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    loop();
  </script>
</body>
</html>
